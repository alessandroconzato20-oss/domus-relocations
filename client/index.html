    <!--
      Critical font-face fallback: render text immediately with system fonts
      while custom fonts load asynchronously. Eliminates invisible text (FOIT).
    -->
    <style>
      /* ===== CRITICAL CSS — inlined to eliminate render-blocking ===== */
      :root {
        --font-serif-fallback: Georgia, 'Times New Roman', Times, serif;
        --font-sans-fallback: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        --domus-ivory: #F5F0E8;
        --domus-charcoal: #1A1814;
        --domus-gold: #C9A84C;
        --domus-dark: #0F0D0B;
      }
      /* Prevent FOUC — set background immediately so no white flash */
      html { background-color: #F5F0E8; }
      body {
        margin: 0;
        font-family: var(--font-sans-fallback);
        background-color: #F5F0E8;
        color: #1A1814;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: var(--font-serif-fallback);
      }
      /* Hero section: reserve full-viewport height immediately so LCP image

      #root { min-height: 100vh; }
      /* Prevent layout shift from navigation */
      nav, header { display: block; }

    <!--
      JSON-LD Structured Data

    <!-- 1. LocalBusiness + ProfessionalService: who we are and where we operate -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["ProfessionalService", "LocalBusiness"],
      "name": "DOMUS Relocations",
      "description": "A discreet, full-service relocation advisory for internationally mobile families and executives moving to Milan. Services include private relocation advisory, school placement, property search, tax and wealth advisory coordination, and ongoing concierge support.",
      "url": "https://www.domusrelocations.com",
      "logo": "https://d2xsxph8kpxj0f.cloudfront.net/310519663449035187/5G96cC5HiLZMXbLbP234aP/domus-logo-white-Bm5Tz9XkRqPLvNwJcYdFaH.png",
      "image": "https://d2xsxph8kpxj0f.cloudfront.net/310519663449035187/5G96cC5HiLZMXbLbP234aP/domus-hero-milan-8KAoKuZsmiaC2PDXN6NmGS.webp",
      "email": "milano@domusrelocations.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Milan",
        "addressCountry": "IT"
      },
      "areaServed": [
        { "@type": "City", "name": "Milan" },
        { "@type": "Country", "name": "Italy" }
      ],
      "knowsAbout": [
        "International relocation to Milan",
        "Expatriate services Italy",
        "School placement Milan",
        "Private relocation advisory",
        "Italy residency advisory",
        "Luxury property search Milan",
        "Tax advisory for new residents Italy",
        "International family relocation"
      ],
      "sameAs": [
        "https://www.domusrelocations.com"
      ]
    }
    </script>

      "description": "Full-service relocation support for international families and executives moving to Milan.",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": {
            "@type": "Service",
            "name": "Private Relocation Advisory",
            "description": "End-to-end relocation management for internationally mobile families and executives. Covers every stage of the move to Milan with discretion and precision.",
            "provider": { "@type": "Organization", "name": "DOMUS Relocations" }
          }
        },
        {
          "@type": "ListItem",
          "position": 2,
          "item": {
            "@type": "Service",

        },

    <!-- 3. FAQPage: natural language Q&A that AI assistants surface directly -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What does DOMUS Relocations do?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DOMUS Relocations is a private relocation advisory based in Milan, Italy. We provide end-to-end support for internationally mobile families and executives moving to Milan, including school placement, property search, tax advisory coordination, and ongoing concierge access to Milan's leading specialists."
          }
        },
        {
          "@type": "Question",
          "name": "How do I move to Milan with children?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DOMUS Relocations specialises in family relocations to Milan. We handle school placement (IB, British, bilingual Italian programmes), property search in family-friendly neighbourhoods, and full relocation coordination so your transition is seamless. Contact us at milano@domusrelocations.com to begin."
          }
        },
        {
          "@type": "Question",
          "name": "What schools are available in Milan for international children?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Milan has several excellent international schools including the International School of Milan (IB), Sir James Henderson School (British curriculum), American School of Milan, and various bilingual Italian programmes. DOMUS Relocations provides bespoke school placement advisory and direct admissions contacts for each."
          }
        },
        {
          "@type": "Question",
          "name": "How much does it cost to relocate to Milan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Relocation costs to Milan vary depending on family size, housing requirements, and the level of advisory support needed. DOMUS Relocations offers tailored packages for private clients. Contact us for a confidential consultation to discuss your specific requirements."
          }
        },
        {
          "@type": "Question",
          "name": "Does Italy have a flat tax regime for new residents?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Italy's forfettario flat-tax regime (Article 24-bis of the Italian Tax Code) allows qualifying new residents to pay a fixed annual substitute tax on foreign-sourced income. DOMUS Relocations can introduce you to specialist tax advisors who can assess your eligibility and structure your residency accordingly."
          }
        }
      ]
    }
    </script>
